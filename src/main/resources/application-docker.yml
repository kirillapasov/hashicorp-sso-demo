spring:
  config:
    import: vault://
  cloud:
    vault:
      enabled: true
      uri: http://localhost:8200
      token: root-token
      kv:
        enabled: true
        backend: secret
        application-name: hashicorp-sso-demo
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: backend-app
            client-secret: backend-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            authorization-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_AUTHORIZATION_URI:http://localhost:8081/realms/demo/protocol/openid-connect/auth}
            token-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI:http://localhost:8081/realms/demo/protocol/openid-connect/token}
            user-info-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_USER_INFO_URI:http://localhost:8081/realms/demo/protocol/openid-connect/userinfo}
            jwk-set-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/demo/protocol/openid-connect/certs}
            user-name-attribute: preferred_username
      resourceserver:
        jwt:
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8081/realms/demo/protocol/openid-connect/certs}
